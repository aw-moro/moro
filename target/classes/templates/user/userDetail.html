<!DOCTYPE html>
<html lang="jp">
<head>
  <title>ユーザー詳細</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/userDetail.css">
  <link th:href="@{/webjars/bootstrap/3.4.1/css/bootstrap.min.css}" rel="stylesheet">
  <script th:src="@{/webjars/bootstrap/3.4.1/js/bootstrap.min.js}"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/user.js"></script>
</head>
<body>
  <div id="container">
    <!-- ヘッダー部分（画面上部）-->
    <header>
      <!-- ヘッダーロゴ -->
      <h1 id="logo"><img src="/image/logo.png" alt="株式会社エースウォード"></h1>
  
      <!-- スマホ用メニュー -->
      <div id="menubar_hdr">
        <span></span><span></span><span></span>
      </div>
    </header>

    <!-- メイン部分 -->
    <main>
      <section>
        <h2>ユーザ詳細画面</h2>
        <div class="col-sm-8 col-sm-offset-2 error" th:unless="${#lists.isEmpty(errorMessages)}">
          <p th:text="${errorMessage}" th:each="errorMessage : ${errorMessages}"></p>
        </div>

        <div class="col-sm-8 col-sm-offset-2">
          <div class="form-group">
            <label>ユーザ名</label>
            <p class="form-control" th:text="${form.userName}" />
          </div>

          <div class="form-group">
            <label>ユーザ名カナ</label>
            <p class="form-control" th:text="${form.userNameKana}" />
          </div>

          <div class="form-group">
            <label>メールアドレス</label>
            <p class="form-control" th:text="${form.mailaddress}" />
          </div>

          <div class="form-group">
            <label>都道府県</label>
            <p class="form-control" th:each="prefCd : ${T(com.aceward.usermanagement.enums.PrefCdEnum).values()}" 
                th:text="${prefCd.name}" th:if="${prefCd.code == form.prefCd}" />
          </div>

          <div class="form-group">
            <label>郵便番号（ハイフンなし）</label>
            <p class="form-control" th:text="${form.zipCd}" />
          </div>

          <div class="form-group">
            <label>住所</label>
            <p class="form-control" th:text="${form.address}" />
          </div>

          <div class="form-group">
            <label>電話番号（ハイフンなし）</label>
            <p class="form-control" th:text="${form.tel}" />
          </div>

          <div class="form-group">
            <label>生年月日</label>
            <p class="form-control" th:text="${form.birthday}" />
          </div>

          <div class="form-group">
            <label>性別</label>
            <p class="form-control" th:each="gender : ${T(com.aceward.usermanagement.enums.GenderEnum).values()}" 
                th:text="${gender.name}" th:if="${gender.code == form.gender}" />
          </div>

          <div class="form-group">
            <label>付加情報</label>
            <p class="form-control"  th:text="${form.addition}" />
          </div>

          <div class="form-group">
            <label for="note">備考</label>
            <textarea class="form-control" th:field="${form.note}" readonly style="background-color: white;"></textarea>
          </div>

          <div class="text-center">
            <a th:href="@{'/user/update/' + ${form.userCd}}" class="btn btn-primary btn-lg">更新画面へ</a>
          </div>

        </div>
      </section>
    </main>

    <!-- 左メニュー部分 -->
    <div id="menubar">
      <nav>
        <ul>
          <li><a th:href="@{/}">HOME</a></li>
          <li><a th:href="@{/user/register}">ユーザ登録</a></li>
          <li><a th:href="@{/user/list}">ユーザ一覧</a></li>
        </ul>
      </nav>
    </div>

    <!-- フッター部分（画面下部） -->
    <footer>
      <small>Copyright&copy; <a href="https://ace-ward.com/">2018 ACEWARD Co.,Ltd.</a> All Rights Reserved.</small>
      <span class="pr"><a href="https://template-party.com/" target="_blank">《Web Design:Template-Party》</a></span>
    </footer>
  </div>
</body>
</html>
