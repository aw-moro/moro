<!DOCTYPE html>
<html lang="jp">

<head>
  <title>品目ー登録</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/itemRegister.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/themes/base/jquery-ui.min.css">
  <link th:href="@{/webjars/bootstrap/3.4.1/css/bootstrap.min.css}" rel="stylesheet">
  <script th:src="@{/webjars/bootstrap/3.4.1/js/bootstrap.min.js}"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/item.js"></script>
</head>

<body>
  <div id="container">
    <!-- ヘッダー部分（画面上部）-->
    <header>
      <!-- ヘッダーロゴ -->
      <h1 id="logo"><img src="/image/logo.png" alt="株式会社エースウォード"></h1>

      <!-- スマホ用メニュー -->
      <div id="menubar_hdr">
        <span></span><span></span><span></span>
      </div>
    </header>

    <!-- メイン部分 -->
    <main>
      <section>
        <h2>品目登録画面</h2>
        <div class="col-sm-8 col-sm-offset-2 error" th:unless="${#lists.isEmpty(errorMessages)}">
          <p th:text="${errorMessage}" th:each="errorMessage : ${errorMessages}"></p>
        </div>
        <form action="#" th:action="@{/item/registerComplete}" th:object="${form}" method="post" class="row">
          <div class="col-sm-8 col-sm-offset-2">
            <div class="form-group">
              <label for="item"><span class="label label-danger">必須</span> 品目</label>
              <input type="text" class="form-control" th:field="*{item}" placeholder="品名/品番" autofocus required />
            </div>

            <div class="form-group">
              <label for="itemCode">品目コード</label>
              <input type="text" class="form-control" th:field="*{itemCode}" placeholder="品目コード" autofocus />
            </div>

            <div class="form-group">
              <label for="unitPrice">単価</label>
              <input type="text" class="form-control" th:field="*{unitPrice}" placeholder="単価" />
            </div>

            <div class="form-group">
              <label for="quantity">数量</label>
              <input type="text" class="form-control" th:field="*{quantity}" placeholder="デフォルトの数量" />
            </div>

            <div class="form-group">
              <label for="unit">単位 <i class="fa fa-question-circle text-primary" data-toggle="tooltip"
                  title="単位に「%」を設定すると、単価×数量の数値%で価格が計算されます。"></i></label>
              <input type="text" class="form-control" th:field="*{unit}" />
            </div>


              <div class="form-group">
                <label for="itemDetail">品目詳細</label>
                <textarea class="form-control" th:field="*{itemDetail}" rows="4" placeholder="詳細"></textarea>
              </div>

              <div class="form-group">
                <label for="salesTax">消費税</label>
                <select class="form-control" th:field="*{salesTax}">
                  <option value="10">10%</option>
                  <option value="8">8%（軽）</option>
                  <option value="0">非課税</option>
                </select>
              </div>

              <div class="form-group">
                <div class="checkbox">
                  <label>
                    <input type="checkbox" th:field="*{withholdingTax}" value="1" /> 源泉徴収する
                  </label>
                </div>
              </div>


              <div class="text-center">
                <button type="button" class="btn btn-default btn-lg reset">リセット</button>
                <button type="button" class="btn btn-primary btn-lg js_btn_regitser">登録</button>
              </div>
            </div>
        </form>
      </section>
    </main>

    <!-- 左メニュー部分 -->
    <div id="menubar">
      <nav>
        <ul>
          <li><a th:href="@{/}">HOME</a></li>
          <li><a th:href="@{/user/register}">ユーザ登録</a></li>
          <li><a th:href="@{/user/list}">ユーザ一覧</a></li>
          <li class="current"><a th:href="@{/item/register}">品目登録</a></li>
          <li><a th:href="@{/item/list}">品目一覧</a></li>
        </ul>
      </nav>
    </div>

    <!-- フッター部分（画面下部） -->
    <footer>
      <small>Copyright&copy; <a href="https://ace-ward.com/">2018 ACEWARD Co.,Ltd.</a> All Rights Reserved.</small>
      <span class="pr"><a href="https://template-party.com/" target="_blank">《Web Design:Template-Party》</a></span>
    </footer>
  </div>
</body>

</html>
