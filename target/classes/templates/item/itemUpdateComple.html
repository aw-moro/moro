<!DOCTYPE html>
<html lang="jp">
<head>
  <title>品目更新完了</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/common.css">
  <link th:href="@{/webjars/bootstrap/3.4.1/css/bootstrap.min.css}" rel="stylesheet">
  <script th:src="@{/webjars/bootstrap/3.4.1/js/bootstrap.min.js}"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
  <script src="/js/main.js"></script>
</head>
<body>
  <div id="container">
    <!-- ヘッダー部分（画面上部）-->
    <header>
      <!-- ヘッダーロゴ -->
      <h1 id="logo"><img src="/image/logo.png" alt="株式会社エースウォード"></h1>
  
      <!-- スマホ用メニュー -->
      <div id="menubar_hdr">
        <span></span><span></span><span></span>
      </div>
    </header>

    <!-- メイン部分 -->
    <main>
      <section>
        <h2>品目更新完了画面</h2>
        <div class="col-sm-8 col-sm-offset-2 success">
          <p>品目更新が完了しました。</p>
        </div>

        <div class="col-sm-8 col-sm-offset-2">
          <p th:text="|品目コード： ${itemCode}|" />
          <p>更新した品目に関して、お問い合わせをする際は品目コードをお伝えください。</p>

          <div class="text-center">
            <a th:href="@{'/item/detail/' + ${itemId}}" class="btn btn-primary btn-lg">詳細画面に戻る</a>
          </div>
        </div>
      </section>
    </main>

    <!-- 左メニュー部分 -->
    <div id="menubar">
      <nav>
        <ul>
          <li><a th:href="@{/}">HOME</a></li>
          <li><a th:href="@{/user/register}">ユーザ登録</a></li>
          <li><a th:href="@{/user/list}">ユーザ一覧</a></li>
          <li><a th:href="@{/item/register}">品目登録</a></li>
          <li><a th:href="@{/item/list}">品目一覧</a></li>
        </ul>
      </nav>
    </div>

    <!-- フッター部分（画面下部） -->
    <footer>
      <small>Copyright&copy; <a href="https://ace-ward.com/">2018 ACEWARD Co.,Ltd.</a> All Rights Reserved.</small>
      <span class="pr"><a href="https://template-party.com/" target="_blank">《Web Design:Template-Party》</a></span>
    </footer>
  </div>
</body>
</html>
