<!DOCTYPE html>
<html lang="jp">

<head>
  <title>品目一覧</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/userList.css">
  <link th:href="@{/webjars/bootstrap/3.4.1/css/bootstrap.min.css}" rel="stylesheet">
  <script th:src="@{/webjars/bootstrap/3.4.1/js/bootstrap.min.js}"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/item.js"></script>
</head>

<body>
  <div id="container">
    <!-- ヘッダー部分（画面上部）-->
    <header>
      <!-- ヘッダーロゴ -->
      <h1 id="logo"><img src="/image/logo.png" alt="株式会社エースウォード"></h1>

      <!-- スマホ用メニュー -->
      <div id="menubar_hdr">
        <span></span><span></span><span></span>
      </div>
    </header>

    <!-- メイン部分 -->
    <main>
      <section>
        <h2>品目一覧画面</h2>

        <div th:if="${successMessage}" class="alert"
          style="text-align: center; margin: 20px auto; width: 80%; padding: 15px; color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; border-radius: 5px; font-weight: bold;">
          <p th:text="${successMessage}" style="margin: 0;"></p>
        </div>

        <form action="#" th:action="@{/item/list/search}" th:object="${form}" method="get" class="row">
          <!-- 検索条件部分 -->
          <div class="col-sm-8 col-sm-offset-2">
            <table class="table table-bordered search-condition">
              <tr>
                <th class="col-md-2 middle">品目コード</th>
                <td class="col-md-4"><input type="text" class="form-control" th:field="*{itemCode}" /></td>
                <th class="col-md-2 middle">品名</th>
                <td class="col-md-4"><input type="text" class="form-control" th:field="*{item}" /></td>
              </tr>

            </table>
            <input type="hidden" name="page" value="0" />
            <input type="hidden" name="size" value="5" />

            <div class="text-center">
              <button type="submit" class="btn btn-primary btn-lg btn-search">検　索</button>
            </div>
          </div>
        </form>

        <!-- 一覧部分 -->
        <div class="col-sm-offset-1 col-sm-10 col-sm-offset-1" style="margin-top: 20px;">
          <div class="error" th:if="${#lists.isEmpty(page.content)}">
            <!-- 0件の場合 -->
            <p class="error-message">検索条件に一致するユーザが見つかりませんでした。条件を変更して再検索してください。</p>
          </div>

          <div th:unless="${#lists.isEmpty(page.content)}">
            <!-- 1件以上の場合 -->
            <table class="table table-bordered result">
              <thead>
                <tr>
                  <th class="col-md-1">品目コード</th>
                  <th class="col-md-2">品名</th>
                  <th class="col-md-3">品目詳細</th>
                  <th class="col-md-1">単価</th>
                  <th class="col-md-1">数量</th>
                  <th class="col-md-1">単位</th>
                  <th class="col-md-1">消費税</th>
                  <th class="col-md-1">源泉徴収税</th>
                  <th class="col-md-1">詳細</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="item : ${page.content}">
                  <td class="col-md-1" th:text="${item.itemCode}">ITEM001</td>
                  <td class="col-md-2" th:text="${item.item}">品名サンプル</td>
                  <td class="col-md-3" th:text="${item.itemDetail}">詳細テキスト</td>
                  <td class="col-md-1" th:text="${item.unitPrice}">1000</td>
                  <td class="col-md-1" th:text="${item.quantity}">10</td>
                  <td class="col-md-1" th:text="${item.unit}">個</td>
                  <td class="col-md-1" th:text="${item.salesTax}">10%</td>
                  <td class="col-md-1" th:text="${item.withholdingTax} ? 'あり' : 'なし'">なし</td>
                  <td class="col-md-1 text-center">
                    <a th:href="@{'/item/detail/' + ${item.itemId}}" class="btn btn-default" role="button">詳細</a>
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- ページャをinclude -->
            <div class="text-center"
              th:include="common/pagenation :: pagenation (url='/item/list/search', page=${page}, ph=${ph})"></div>

            <!-- ページャ用に検索条件を保持するフォーム -->
            <form id="pagenationForm" method="post" action="#" th:object="${form}">
              <input type="hidden" th:field="*{itemCode}" />
              <input type="hidden" th:field="*{item}" />
              <input type="hidden" name="size" value="5" />
            </form>
          </div>
        </div>
      </section>
    </main>

    <!-- 左メニュー部分 -->
    <div id="menubar">
      <nav>
        <ul>
          <li><a th:href="@{/}">HOME</a></li>
          <li><a th:href="@{/user/register}">ユーザ登録</a></li>
          <li><a th:href="@{/user/list}">ユーザ一覧</a></li>
          <li><a th:href="@{/item/register}">品目登録</a></li>
          <li class="current"><a th:href="@{/item/list}">品目一覧</a></li>
        </ul>
      </nav>
    </div>

    <!-- フッター部分（画面下部） -->
    <footer>
      <small>Copyright&copy; <a href="https://ace-ward.com/">2018 ACEWARD Co.,Ltd.</a> All Rights Reserved.</small>
      <span class="pr"><a href="https://template-party.com/" target="_blank">《Web Design:Template-Party》</a></span>
    </footer>
  </div>
</body>

</html>
